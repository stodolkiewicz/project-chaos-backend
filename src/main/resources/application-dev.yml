spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/project-chaos}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}

  jpa:
    show-sql: false

  cloud:
    gcp:
      sql:
        enabled: false
      core:
        enabled: false

  liquibase:
    contexts: dev
    drop-first: true

  kafka:
    producer:
      bootstrap-servers: localhost:9092
      properties:
        schema.registry.url: http://localhost:8081

logging:
  level:
    root: INFO
    org.springframework.security: WARN
    org.springframework.security.oauth2: WARN
    sun.rmi: WARN
    javax.management.remote.rmi: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

app:
  frontend-dashboard-url: http://localhost:3000/dashboard
  security:
    cookie:
      domain: localhost
      secure: false
  ai:
    number-of-requests-in-time-window-limit: 50
    time-window-in-minutes: 10
